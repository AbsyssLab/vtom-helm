{{- end }}

{{- if and .Values.podDisruptionBudget.enabled .Values.itm.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: itm-pdb
  namespace: {{ include "vtom.namespace" . }}
  labels:
    app.kubernetes.io/name: itm
    app.kubernetes.io/component: itm
    {{- include "vtom.labels" . | nindent 4 }}
spec:
  maxUnavailable: 1
  selector:
    matchLabels:
      app: itm
{{- end }}
