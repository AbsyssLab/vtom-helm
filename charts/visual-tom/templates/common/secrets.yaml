    kind: SecretStore
  target:
    name: {{ .Values.itc.database.secretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ITDB_USER
      remoteRef:
        key: {{ .Values.secrets.remoteKeys.itcDbUser }}
    - secretKey: ITDB_PASSWORD
      remoteRef:
        key: {{ .Values.secrets.remoteKeys.itcDbPassword }}
