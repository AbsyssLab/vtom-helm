{{- end }}
{{- end }}

{{- else }}
# secrets.provider=kubernetes: K8s Secrets must be created manually.
# Template provided below to fill in (values in base64).
#
# VTOM   : TOM_SGBD_USER     = database username
#           TOM_SGBD_PASSWORD = password ENCRYPTED in VTOM format (Absyss bcrypt)
# ITC/ITM: ITDB_USER         = database username
#           ITDB_PASSWORD     = PLAIN-TEXT password
{{- end }}
