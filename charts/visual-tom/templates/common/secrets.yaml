{{- if eq .Values.secrets.provider "external-secrets" }}
{{- if not (or .Values.secrets.azure.keyVaultUrl .Values.secrets.aws.region .Values.secrets.gcp.projectId) }}
{{- fail "secrets.provider is 'external-secrets' but no cloud backend is configured. Set one of: secrets.azure.keyVaultUrl, secrets.aws.region, or secrets.gcp.projectId." }}
{{- else }}
---
# SecretStore — connection to the cloud secrets provider
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: {{ include "vtom.secretStoreName" . }}
  namespace: {{ include "vtom.namespace" . }}
  labels:
    app.kubernetes.io/name: vtom
    {{- include "vtom.labels" . | nindent 4 }}
spec:
  provider:
    {{- if .Values.secrets.azure.keyVaultUrl }}
    azurekv:
      authType: WorkloadIdentity
      vaultUrl: {{ .Values.secrets.azure.keyVaultUrl | quote }}
      tenantId: {{ .Values.secrets.azure.tenantId | quote }}
      serviceAccountRef:
        name: {{ .Values.serviceAccount.name }}
    {{- else if .Values.secrets.aws.region }}
    aws:
      service: SecretsManager
      region: {{ .Values.secrets.aws.region | quote }}
      auth:
        jwt:
          serviceAccountRef:
            name: {{ .Values.serviceAccount.name }}
    {{- else if .Values.secrets.gcp.projectId }}
    gcpsm:
      projectID: {{ .Values.secrets.gcp.projectId | quote }}
      auth:
        workloadIdentity:
          clusterLocation: {{ .Values.secrets.gcp.clusterLocation | quote }}
          clusterName: {{ .Values.secrets.gcp.clusterName | quote }}
          serviceAccountRef:
            name: {{ .Values.serviceAccount.name }}
    {{- end }}

{{- if .Values.vtom.enabled }}
---
# VTOM DB Secret (password encrypted in VTOM format)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vtom-db-secret
  namespace: {{ include "vtom.namespace" . }}
  labels:
    app.kubernetes.io/name: vtom
    {{- include "vtom.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.refreshInterval }}
  secretStoreRef:
    name: {{ include "vtom.secretStoreName" . }}
    kind: SecretStore
  target:
    name: vtom-db-secret
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: TOM_SGBD_USER
      remoteRef:
        key: {{ .Values.secrets.remoteKeys.vtomDbUser }}
    - secretKey: TOM_SGBD_PASSWORD
      remoteRef:
        key: {{ .Values.secrets.remoteKeys.vtomDbPassword }}

---
# VTOM license Secret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.vtom.license.secretName }}
  namespace: {{ include "vtom.namespace" . }}
  labels:
    app.kubernetes.io/name: vtom
    {{- include "vtom.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.refreshInterval }}
  secretStoreRef:
    name: {{ include "vtom.secretStoreName" . }}
    kind: SecretStore
  target:
    name: {{ .Values.vtom.license.secretName }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: {{ .Values.vtom.license.secretKey }}
      remoteRef:
        key: {{ .Values.secrets.remoteKeys.vtomLicense }}
{{- end }}

{{- if .Values.itc.enabled }}
---
# ITC DB Secret (PLAIN-TEXT password — ITC does not support VTOM encryption)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: itc-db-secret
  namespace: {{ include "vtom.namespace" . }}
  labels:
    app.kubernetes.io/name: itc
    {{- include "vtom.labels" . | nindent 4 }}
