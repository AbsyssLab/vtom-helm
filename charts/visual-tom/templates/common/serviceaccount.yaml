apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ include "vtom.namespace" . }}
  labels:
    app.kubernetes.io/name: vtom
    {{- include "vtom.labels" . | nindent 4 }}
  {{- if .Values.serviceAccount.workloadIdentity.enabled }}
  annotations:
    {{- if .Values.serviceAccount.azure.clientId }}
    azure.workload.identity/client-id: {{ .Values.serviceAccount.azure.clientId | quote }}
    {{- end }}
    {{- if .Values.serviceAccount.aws.roleArn }}
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.aws.roleArn | quote }}
    {{- end }}
    {{- if .Values.serviceAccount.gcp.serviceAccount }}
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccount.gcp.serviceAccount | quote }}
    {{- end }}
  {{- end }}
  {{- if and .Values.serviceAccount.workloadIdentity.enabled .Values.serviceAccount.azure.clientId }}
  # Label requis par le webhook azure-workload-identity
  # Fusionné avec les labels ci-dessus via un post-render ou en les incluant directement
  {{- end }}
automountServiceAccountToken: false
