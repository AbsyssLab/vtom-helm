# Creates a Traefik Middleware that permanently redirects HTTP traffic to HTTPS
# when ingress is enabled with Traefik and HTTPS redirection is configured.
{{- if and .Values.ingress.enabled .Values.ingress.httpsRedirect (eq .Values.ingress.className "traefik") }}
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: {{ include "vtom.namespace" . }}
  labels:
    {{- include "vtom.labels" . | nindent 4 }}
spec:
  redirectScheme:
    scheme: https
    permanent: true
{{- end }}
