{{- if .Values.vtom.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vtom-apiserver
  namespace: {{ include "vtom.namespace" . }}
  labels:
    app.kubernetes.io/name: vtom
    app.kubernetes.io/component: apiserver
    {{- include "vtom.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vtom-apiserver
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: vtom-apiserver
        app.kubernetes.io/name: vtom
        app.kubernetes.io/component: apiserver
        vtom.io/db-access: "true"
        {{- include "vtom.workloadIdentityPodLabel" . | nindent 8 }}
        {{- with .Values.vtom.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/vtom/configmap.yaml") . | sha256sum }}
        {{- with .Values.vtom.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      automountServiceAccountToken: false
      {{- include "vtom.imagePullSecrets" . | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        {{- if .Values.securityContext.runAsUser }}
        runAsUser: {{ .Values.securityContext.runAsUser }}
        {{- end }}
        fsGroup: 0
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        {{- include "vtom.sidecar.dbProxy" . | nindent 8 }}
        {{- if .Values.dbProxy.enabled }}
        {{- include "vtom.initContainer.waitForDb" . | nindent 8 }}
        {{- end }}
        {{- include "vtom.initContainer.waitForServer" . | nindent 8 }}
      containers:
        - name: vtom-apiserver
          image: {{ include "vtom.image" . | quote }}
          imagePullPolicy: {{ .Values.vtom.image.pullPolicy }}
          args: ["apiserver"]
          envFrom:
            - configMapRef:
                name: vtom-config-vtom
          env:
            - name: TZ
              value: {{ .Values.vtom.timezone | quote }}
            - name: TOM_SGBD_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vtom.database.secretName }}
                  key: TOM_SGBD_USER
            - name: TOM_SGBD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.vtom.database.secretName }}
                  key: TOM_SGBD_PASSWORD
            - name: PGSSLMODE
              value: {{ .Values.database.sslMode | default "require" | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.vtom.ports.apiserver }}
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: {{ .Values.vtom.ports.apiserver }}
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: {{ .Values.vtom.ports.apiserver }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
          startupProbe:
            tcpSocket:
              port: {{ .Values.vtom.ports.apiserver }}
            failureThreshold: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.vtom.apiserverResources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: customer-data
              mountPath: /var/lib/absyss/visual-tom
            # Mount the license secret inside the PVC (customer-data) so the entrypoint
            # symlink /opt/absyss/visual-tom/license -> /var/lib/absyss/visual-tom/license
            # works as intended. Mounting under /opt/.../license/ instead would turn that
            # directory into a non-removable mountpoint, the rm -rf + ln -s would silently
            # misfire, and license.data / license.diagnostic / license.events written by
            # the Java code would land on the container rootfs (lost at each restart →
            # a new License Server "Register instance" every reboot → quota burn).
            - name: license
              mountPath: /var/lib/absyss/visual-tom/license/{{ .Values.vtom.license.secretKey }}
              subPath: {{ .Values.vtom.license.secretKey }}
              readOnly: true
      volumes:
        - name: customer-data
          persistentVolumeClaim:
            claimName: vtom-apiserver-pvc
        - name: license
          secret:
            secretName: {{ .Values.vtom.license.secretName }}
            defaultMode: 0440
      terminationGracePeriodSeconds: 60
      {{- with .Values.vtom.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vtom.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vtom.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
