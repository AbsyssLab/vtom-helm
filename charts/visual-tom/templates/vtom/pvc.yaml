{{- if .Values.vtom.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vtom-server-pvc
  namespace: {{ include "vtom.namespace" . }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/name: vtom
    app.kubernetes.io/component: server
    {{- include "vtom.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- $scServer := coalesce .Values.vtom.serverPvc.storageClassName .Values.storageClass.name }}
  {{- if $scServer }}
  storageClassName: {{ $scServer }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.vtom.serverPvc.size }}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vtom-apiserver-pvc
  namespace: {{ include "vtom.namespace" . }}
  annotations:
    helm.sh/resource-policy: keep
  labels:
    app.kubernetes.io/name: vtom
