name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # for GitHub Release creation
  packages: write   # for pushing OCI artifact to GHCR

jobs:
  publish-chart:
    name: 📦 Publish chart to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ⛵ Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: 🏷️ Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing chart version: $VERSION"

      - name: 🔢 Verify Chart.yaml version matches tag
        run: |
          CHART_VERSION=$(grep '^version:' charts/visual-tom/Chart.yaml | awk '{print $2}')
          if [ "$CHART_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::Chart.yaml version ($CHART_VERSION) does not match tag (${{ steps.version.outputs.version }})"
            exit 1
          fi

      - name: 📦 Package chart
        run: |
          helm package charts/visual-tom --destination .

      - name: 🔐 Log in to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: 🚀 Push chart to GHCR
        run: |
          helm push visual-tom-${{ steps.version.outputs.version }}.tgz \
            oci://ghcr.io/absysslab

      - name: 🎉 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: visual-tom ${{ github.ref_name }}
          generate_release_notes: true
          files: visual-tom-${{ steps.version.outputs.version }}.tgz
          body: |
            ## 📦 Installation

            ```bash
            helm install visual-tom oci://ghcr.io/absysslab/visual-tom \
              --version ${{ steps.version.outputs.version }} \
              -f values-<cloud>.yaml \
              -f values-mycompany.yaml \
              --namespace vtom --create-namespace
            ```

            See [README](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/README.md) for the full deployment guide.
